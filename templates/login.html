<!doctype html>
<html lang="en">
  <head>
    <title>Login - Analisis Sentimen</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='assets/icon.png') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <nav>
          <div class="logo">
            <img
              src="{{ url_for('static', filename='assets/logo.png') }}"
              alt="Logo"
            />
          </div>
          <input type="checkbox" id="click" />
          <label for="click" class="menu-btn">
            <i class="fas fa-bars"></i>
          </label>
          <ul>
            <li>
              <a href="{{ url_for('register') }}" class="btn_login">Register</a>
            </li>
          </ul>
        </nav>
      </header>
      <main>
        <div class="center">
          <div class="form-login">
            <h3>Login</h3>

            {% with messages = get_flashed_messages() %} {% if messages %} {%
            for msg in messages %}
            <div class="alert">{{ msg }}</div>
            {% endfor %} {% endif %} {% endwith %}

            <form action="{{ url_for('login_proses') }}" method="POST">
              <input
                class="input"
                type="text"
                name="username"
                placeholder="Username"
                required
              />
              <input
                class="input"
                type="password"
                name="password"
                placeholder="Password"
                required
              />
              <button type="submit" class="btn_login" name="login">
                Login
              </button>
            </form>
          </div>
        </div>
      </main>
      <footer>
        <h4>&copy; Tugas Akhir Malik Abdullah</h4>
      </footer>
    </div>
  </body>
</html>
